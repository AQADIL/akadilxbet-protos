syntax = "proto3";

package wallet;

option go_package = "github.com/AQADIL/akadilxbet-protos/pb/wallet";

service WalletService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse);
  rpc Deposit    (DepositRequest)    returns (BalanceResponse);
  rpc Deduct     (DeductRequest)     returns (BalanceResponse);
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  string user_id   = 1;
  string username  = 2;
  string email     = 3;
  int64  balance   = 4;
  int64  created_at = 5;
}

message GetBalanceRequest {
  string user_id = 1;
}

message GetBalanceResponse {
  string user_id = 1;
  int64  balance = 2;
}

message DepositRequest {
  string user_id = 1;
  int64  amount  = 2;
}

message DeductRequest {
  string user_id = 1;
  int64  amount  = 2;
}

message BalanceResponse {
  string user_id     = 1;
  int64  new_balance = 2;
}
